<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健身倒计时</title>
    <!-- 引入vConsole -->
    <script src="https://cdn.jsdelivr.net/npm/vconsole@3.15.1/dist/vconsole.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #countdown {
            font-size: 200px;
            font-weight: bold;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            z-index: 10;
        }
        #listenButton {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background-color: red;
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 20;
        }
        #listenButton.listening {
            background-color: green;
        }
        #listenButton:active {
            transform: scale(0.95);
        }
        #statusMessage {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(255, 255, 255, 0.9);
            color: black;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 14px;
            display: none;
            z-index: 30;
            text-align: center;
        }
        #statusMessage.error {
            background-color: rgba(255, 0, 0, 0.9);
            color: white;
        }
        #statusMessage.success {
            background-color: rgba(0, 128, 0, 0.9);
            color: white;
        }
    </style>
</head>
<body>
    <div id="countdown"></div>
    <button id="listenButton">开启监听</button>
    <div id="statusMessage"></div>

    <script>
        // 初始化vConsole
        const vConsole = new VConsole();
        
        // 全局变量
        let recognition = null;
        let isListening = false;
        let isCountingDown = false;
        let wakeLock = null;
        let audioContext = null;

        // DOM元素
        const listenButton = document.getElementById('listenButton');
        const countdownElement = document.getElementById('countdown');
        const statusMessage = document.getElementById('statusMessage');

        // 显示状态消息
        function showMessage(message, type = 'info', duration = 3000) {
            statusMessage.textContent = message;
            statusMessage.className = type;
            statusMessage.style.display = 'block';
            
            if (duration > 0) {
                setTimeout(() => {
                    statusMessage.style.display = 'none';
                }, duration);
            }
        }

        // 初始化音频上下文
        function initAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                // 播放一段极短的无声音频，解除iOS Safari的自动播放限制
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                gainNode.gain.value = 0;
                oscillator.start();
                oscillator.stop(audioContext.currentTime + 0.01);
            }
        }

        // 播放提示音
        function playTone(frequency, duration) {
            if (!audioContext) initAudioContext();
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            gainNode.gain.value = 0.5;
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

        // 播放开始休息提示音
        function playRestStartSound() {
            playTone(200, 100);
            setTimeout(() => playTone(200, 100), 150);
        }

        // 播放休息结束提示音
        function playRestEndSound() {
            playTone(800, 50);
            setTimeout(() => playTone(800, 50), 80);
        }

        // 播放开始训练提示音
        function playTrainingStartSound() {
            playTone(400, 100);
            setTimeout(() => playTone(400, 100), 150);
        }

        // 开始倒计时
        function startCountdown(seconds, isTraining = false) {
            if (isCountingDown) return;
            
            isCountingDown = true;
            countdownElement.textContent = seconds;
            countdownElement.style.display = 'block';
            
            // 隐藏按钮
            listenButton.style.display = 'none';
            
            // 暂时停止语音识别，避免自动停止后需要重新授权
            if (recognition && isListening) {
                recognition.stop();
            }
            
            if (isTraining) {
                playTrainingStartSound();
            } else {
                playRestStartSound();
            }
            
            const interval = setInterval(() => {
                seconds--;
                countdownElement.textContent = seconds;
                
                if (seconds <= 0) {
                    clearInterval(interval);
                    countdownElement.style.display = 'none';
                    isCountingDown = false;
                    // 显示按钮
                    listenButton.style.display = 'block';
                    playRestEndSound();
                    
                    // 重新开始监听
                    if (isListening && recognition) {
                        try {
                            recognition.start();
                        } catch (e) {
                            console.log('重新启动语音识别失败:', e);
                        }
                    }
                }
            }, 1000);
        }

        // 请求屏幕常亮
        async function requestWakeLock() {
            try {
                wakeLock = await navigator.wakeLock.request('screen');
            } catch (err) {
                console.log('无法获取屏幕常亮:', err);
            }
        }

        // 初始化语音识别
        function initSpeechRecognition() {
            if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                recognition = new SpeechRecognition();
                
                recognition.continuous = true;
                recognition.interimResults = true;
                recognition.lang = 'zh-CN';
                
                recognition.onstart = () => {
                    console.log('语音识别已开始');
                    // 移除频繁的提示，避免干扰
                };
                
                recognition.onresult = (event) => {
                    showMessage('', 'info', 0);
                    console.log('收到语音识别结果:', event.results);
                    for (let i = event.resultIndex; i < event.results.length; i++) {
                        const transcript = event.results[i][0].transcript;
                        console.log('识别文本:', transcript, '是否最终结果:', event.results[i].isFinal);
                        
                        // 显示识别结果，方便调试
                        if (event.results[i].isFinal) {
                            console.log('最终识别结果:', transcript);
                            // 显示识别结果
                            showMessage('识别结果: "' + transcript + '"', 'info', 2000);
                        }
                        
                        if (event.results[i].isFinal && !isCountingDown) {
                            console.log('处理最终识别结果:', transcript);
                            // 增加容错，不区分大小写，去除空格
                            const normalizedTranscript = transcript.toLowerCase().trim();
                            console.log('标准化后的识别结果:', normalizedTranscript);
                            
                            if (normalizedTranscript.includes('休息')) {
                                showMessage('检测到"休息"，开始倒计时', 'success', 1000);
                                startCountdown(15, false);
                            } else if (normalizedTranscript.includes('训练')) {
                                showMessage('检测到"训练"，开始倒计时', 'success', 1000);
                                startCountdown(30, true);
                            }
                        }
                    }
                };
                
                recognition.onerror = (event) => {
                    if (event.error === 'not-allowed') {
                        console.log('语音识别被拒绝，检查麦克风权限');
                        // 检查权限状态
                        if ('permissions' in navigator) {
                            navigator.permissions.query({name: 'microphone'})
                                .then(permissionStatus => {
                                    console.log('麦克风权限状态:', permissionStatus.state);
                                    if (permissionStatus.state === 'denied') {
                                        showMessage('麦克风权限已被拒绝，请在浏览器设置中允许访问', 'error', 5000);
                                    } else if (permissionStatus.state === 'prompt') {
                                        showMessage('请允许麦克风权限请求', 'info', 3000);
                                    } else if (permissionStatus.state === 'granted') {
                                        // 权限已授予但仍出错，可能是其他原因
                                        console.log('权限已授予但语音识别仍被拒绝，可能是浏览器安全策略');
                                        showMessage('权限已授予，但浏览器阻止了语音识别，请检查浏览器设置', 'error', 5000);
                                    } else {
                                        showMessage('权限错误: ' + (permissionStatus.state || '未知状态') + '，请重试', 'error', 3000);
                                    }
                                })
                                .catch(err => {
                                    console.error('权限检查失败:', err);
                                    showMessage('权限检查失败: ' + (err.message || err), 'error', 3000);
                                });
                        } else {
                            // 浏览器不支持permissions API
                            console.log('浏览器不支持permissions API');
                            showMessage('麦克风权限错误，请在浏览器设置中检查', 'error', 5000);
                        }
                        stopListening();
                    } else if (event.error === 'no-speech') {
                        console.log('未检测到语音');
                    } else if (event.error === 'network') {
                        showMessage('网络连接错误，请检查网络连接', 'error', 5000);
                        stopListening();
                    } else if (event.error === 'aborted') {
                        console.log('语音识别被中止');
                    } else {
                            console.log('其他错误:', event.error);
                            showMessage('发生错误: ' + event.error + '，请重试', 'error', 3000);
                        }
                };
                
                recognition.onend = () => {
                    console.log('语音识别已结束');
                    if (isListening && !isCountingDown) {
                        try {
                            console.log('重新启动语音识别');
                            // 短暂延迟后重新启动，避免频繁请求
                            setTimeout(() => {
                                try {
                                    recognition.start();
                                } catch (e) {
                                    console.log('重新启动语音识别失败:', e);
                                    isListening = false;
                                    listenButton.textContent = '开启监听';
                                    listenButton.classList.remove('listening');
                                }
                            }, 500);
                        } catch (e) {
                            console.log('重新启动语音识别失败:', e);
                            isListening = false;
                            listenButton.textContent = '开启监听';
                            listenButton.classList.remove('listening');
                        }
                    }
                };
            } else {
                alert('您的浏览器不支持语音识别功能。请使用Chrome、Safari或其他支持Web Speech API的浏览器。');
            }
        }

        // 开始监听
        function startListening() {
            if (!recognition) initSpeechRecognition();
            if (recognition && !isListening) {
                showMessage('正在请求麦克风权限...', 'info', 0);
                
                // 直接尝试获取音频流，不依赖permissions API
                console.log('尝试获取麦克风音频流');
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        console.log('音频流获取成功');
                        console.log('音频轨道数量:', stream.getAudioTracks().length);
                        // 检查音频轨道状态
                        const audioTrack = stream.getAudioTracks()[0];
                        console.log('音频轨道状态:', audioTrack.readyState);
                        console.log('音频轨道标签:', audioTrack.label);
                        
                        handleAudioStream(stream);
                    })
                    .catch(error => {
                        console.error('获取音频流失败:', error);
                        if (error.name === 'NotAllowedError') {
                            showMessage('麦克风权限已被拒绝，请在浏览器设置中允许访问', 'error', 5000);
                        } else if (error.name === 'NotFoundError') {
                            showMessage('未找到麦克风设备', 'error', 5000);
                        } else if (error.name === 'NotReadableError') {
                            showMessage('麦克风被其他应用占用', 'error', 5000);
                        } else {
                            showMessage('无法获取麦克风权限: ' + (error.message || error), 'error', 5000);
                        }
                        stopListening();
                    });
            }
        }
        
        // 处理音频流
        function handleAudioStream(stream) {
            // 确保音频上下文处于活动状态
            initAudioContext();
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            
            // 保存流引用，防止被垃圾回收
            window.audioStream = stream;
            
            // 配置语音识别
            recognition.continuous = true; // Edge浏览器可能更兼容
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;
            recognition.lang = 'zh-CN'; // 确保语言设置正确
            
            // 增加语音识别事件监听
            recognition.onnomatch = () => {
                console.log('语音识别无匹配结果');
                showMessage('未识别到关键词，请再说一次', 'info', 2000);
            };
            
            // 启动语音识别
            try {
                console.log('尝试启动语音识别');
                console.log('语音识别配置:', {
                    continuous: recognition.continuous,
                    interimResults: recognition.interimResults,
                    maxAlternatives: recognition.maxAlternatives,
                    lang: recognition.lang
                });
                recognition.start();
                console.log('语音识别启动成功');
                isListening = true;
                listenButton.textContent = '监听中…';
                listenButton.classList.add('listening');
                requestWakeLock();
                
                // 权限请求成功后隐藏消息
                setTimeout(() => {
                    showMessage('监听已启动，请说"休息"或"训练"', 'success', 2000);
                }, 1000);
            } catch (recogError) {
                console.error('启动语音识别失败:', recogError);
                console.error('错误类型:', recogError.name);
                console.error('错误消息:', recogError.message);
                showMessage('启动语音识别失败: ' + (recogError.message || recogError), 'error', 5000);
                stopListening();
                // 关闭流
                stream.getTracks().forEach(track => track.stop());
            }
        }

        // 停止监听
        function stopListening() {
            if (recognition && isListening) {
                isListening = false;
                listenButton.textContent = '开启监听';
                listenButton.classList.remove('listening');
                recognition.stop();
                
                // 关闭音频流
                if (window.audioStream) {
                    try {
                        window.audioStream.getTracks().forEach(track => track.stop());
                        window.audioStream = null;
                        console.log('音频流已关闭');
                    } catch (error) {
                        console.error('关闭音频流失败:', error);
                    }
                }
            }
        }

        // 按钮点击事件
        listenButton.addEventListener('click', async () => {
            try {
                // 确保音频上下文处于活动状态
                initAudioContext();
                if (audioContext && audioContext.state === 'suspended') {
                    await audioContext.resume();
                }
                
                if (isListening) {
                    stopListening();
                } else {
                    // 先检查权限状态
                    if ('permissions' in navigator) {
                        try {
                            const permissionStatus = await navigator.permissions.query({name: 'microphone'});
                            console.log('当前麦克风权限状态:', permissionStatus.state);
                            
                            if (permissionStatus.state === 'granted') {
                                // 已获得权限
                                startListening();
                            } else if (permissionStatus.state === 'prompt') {
                                // 未请求过权限，直接请求
                                startListening();
                            } else {
                                // 权限被拒绝
                                showMessage('麦克风权限已被拒绝，请在浏览器设置中允许访问', 'error', 5000);
                            }
                        } catch (err) {
                            console.error('权限检查失败:', err);
                            // 权限检查失败，直接尝试请求
                            startListening();
                        }
                    } else {
                        // 浏览器不支持permissions API，直接尝试请求
                        startListening();
                    }
                }
            } catch (error) {
                console.error('按钮点击处理失败:', error);
                showMessage('操作失败，请重试', 'error', 3000);
            }
        });

        // 页面可见性变化时处理
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && isListening) {
                recognition.stop();
            } else if (!document.hidden && isListening) {
                recognition.start();
            }
        });

        // 页面加载时检查环境
        window.addEventListener('load', () => {
            if (location.protocol !== 'https:' && location.hostname !== 'localhost' && location.protocol !== 'file:') {
                showMessage('警告：麦克风功能需要HTTPS环境，当前可能无法正常工作', 'error', 8000);
            }
            
            if (!('SpeechRecognition' in window) && !('webkitSpeechRecognition' in window)) {
                showMessage('您的浏览器不支持语音识别功能', 'error', 5000);
            }
        });
    </script>
</body>
</html>
